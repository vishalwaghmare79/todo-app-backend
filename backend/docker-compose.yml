services:
  mongo:
    image: mongo:7
    container_name: todo-backend-mongo
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api-gateway:
    image: ${ECR_REGISTRY:-local}/todo-backend-api-gateway:${IMAGE_TAG:-latest}
    container_name: todo-backend-api-gateway
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    env_file:
      - ./api-gateway/.env
    environment:
      PORT: 4000
      AUTH_SERVICE_URL: http://auth-service:4001
      TODO_SERVICE_URL: http://todo-service:4002
    ports:
      - "4000:4000"
    depends_on:
      - auth-service
      - todo-service

  auth-service:
    image: ${ECR_REGISTRY:-local}/todo-backend-auth-service:${IMAGE_TAG:-latest}
    container_name: todo-backend-auth-service
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4001/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    env_file:
      - ./auth-service/.env
    environment:
      PORT: 4001
      MONGO_URI: mongodb://mongo:27017/ec2test
    ports:
      - "4001:4001"
    depends_on:
      - mongo

  todo-service:
    image: ${ECR_REGISTRY:-local}/todo-backend-todo-service:${IMAGE_TAG:-latest}
    container_name: todo-backend-todo-service
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4002/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    env_file:
      - ./todo-service/.env
    environment:
      PORT: 4002
      MONGO_URI: mongodb://mongo:27017/ec2test
    ports:
      - "4002:4002"
    depends_on:
      - mongo

volumes:
  mongo_data:
